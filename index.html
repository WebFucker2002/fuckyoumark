<!DOCTYPE html>
<html>
<head>

<audio id="backgroundAudio" autoplay muted loop>
  <source src="NIGGAS.mp3" type="audio/mpeg">
</audio>
  
<style>
body {
  background-image: url("IMAGE1.PNG");
  background-repeat: no-repeat; /* Prevents the image from tiling */
  background-size: cover;       /* Ensures the image covers the entire viewport */
  background-attachment: fixed; /* Keeps the image fixed during scrolling */
  background-color: #cccccc;    /* Fallback color if the image doesn't load */

/* DOWN BELLOW IS FOR MY TEXT */
  
    font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
}

  .box {
      width: 200px;
      height: 100px;
      background-color: #4CAF50;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 15px;
      border-radius: 8px;
      font-size: 18px;
      text-align: center;
    }


  
   /* Heartbeat */
    .heartbeat {
      animation: heartbeat 1.5s infinite;
    }

    @keyframes heartbeat {
      0%, 100% {
        transform: scale(1);
      }
      14% {
        transform: scale(1.3);
      }
      28% {
        transform: scale(1);
      }
      42% {
        transform: scale(1.3);
      }
      70% {
        transform: scale(1);
      }
    }
  
</style>
 
<script>
   var audioPlayer = document.getElementById('backgroundAudio');

  // Wait for the audio to be ready to play before setting the time
  audioPlayer.addEventListener('canplaythrough', function() {
    // Check if the current time has already been set to avoid issues in some browsers
    if (this.currentTime < 30) {
      this.currentTime = 30; // Skip to 30 seconds
    }
    this.play(); // Start playing (it will be muted as per HTML attribute)
  });
</script>
 
</head>
<body>

   <div class="box heartbeat"> FUCK YOU MARK</div>
  
</body>
</html>
